<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>SIAP WANAMSKA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #FDF8F4; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- Pastikan URL src di bawah ini adalah URL Web App GAS Anda -->
    <iframe 
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbyGFxe0Avuo2FGy-9HWoc7iOMtDPJDQd8fzfmca6ZsbfJc3S_rqYq16KZ9Bf39ezJ_U/exec" 
        allow="geolocation; camera; microphone;">
    </iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js');
            });
        }
    </script>
</body>
</html>
