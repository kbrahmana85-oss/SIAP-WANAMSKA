<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAP WANAMSKA</title>
    <script src="https://cdn.tailwindcss.com"></script><script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .bottom-nav { background: #6F4E37; }
        body { background-color: #f8fafc; padding-bottom: 120px; font-family: sans-serif; }
        .glass-header { background: linear-gradient(135deg, #6F4E37 0%, #3d2b1e 100%); }
        .star-on { color: #facc15; fill: #facc15; } .star-off { color: #e2e8f0; fill: #e2e8f0; }
        .label-detil { @apply text-[9px] font-bold text-slate-400 uppercase; } 
        .isi-detil { @apply text-sm font-bold text-slate-700 leading-tight; }
    </style>
</head>
<body>
    <div id="modal-edit" class="fixed inset-0 bg-black/70 z-[200] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8">
            <h2 class="font-black text-slate-800 mb-6 italic uppercase flex gap-2"><i data-lucide="edit-3"></i> EDIT PROFIL</h2>
            <div class="space-y-4 max-h-[50vh] overflow-y-auto">
                <input type="password" id="e-pass" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Ganti Password">
                <input type="text" id="e-regu" placeholder="Nama Regu" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <textarea id="e-alamat" placeholder="Alamat" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none"></textarea>
                <input type="text" id="e-ortu" placeholder="Nama Orang Tua" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
                <input type="text" id="e-kerja" placeholder="Pekerjaan Orang Tua" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="closeModal()" class="flex-1 font-bold text-slate-300">BATAL</button>
                <button onclick="saveEdit()" class="flex-1 bg-amber-800 text-white py-4 rounded-2xl font-bold shadow-lg">SIMPAN</button>
            </div>
        </div>
    </div>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-6 bg-slate-100 text-center">
        <div class="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-md border-t-8 border-amber-900">
            <img src="logo.png" class="w-20 mx-auto mb-4" onerror="this.src='https://i.ibb.co/vz6W7rX/logo-pramuka.png'">
            <h1 class="text-xl font-black">SIAP WANAMSKA</h1>
            <div class="mt-8 space-y-4">
                <input type="text" id="username" placeholder="User ID" class="w-full p-4 border rounded-2xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 border rounded-2xl outline-none">
                <button onclick="handleLogin()" id="btn-login" class="w-full bg-amber-800 text-white p-4 rounded-2xl font-black shadow-xl">MASUK</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="glass-header text-white p-6 sticky top-0 z-[100] rounded-b-[40px] shadow-2xl">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3"><img src="logo.png" class="w-10 h-10 brightness-200" onerror="this.src='https://i.ibb.co/vz6W7rX/logo-pramuka.png'"><p class="font-black text-sm uppercase">Wanamska</p></div>
                <div class="text-right"><p id="clock" class="text-xl font-black leading-none"></p><p id="date" class="text-[8px] font-bold opacity-60 mt-1 uppercase"></p></div>
            </div>
        </header>

        <main class="p-5 max-w-md mx-auto">
            <section id="menu-home" class="content-section">
                <div class="flex justify-between items-center mb-4"><h2 class="font-black italic uppercase">Dashboard</h2><div id="stars-top" class="flex gap-0.5"></div></div>
                <div class="bg-white p-8 rounded-[40px] border shadow-sm text-center mb-6">
                    <p class="text-[9px] font-bold text-slate-400 mb-2">KEHADIRAN GLOBAL HARI INI</p>
                    <h3 id="g-persen" class="text-6xl font-black text-amber-900">0%</h3>
                </div>
            </section>

            <section id="menu-absensi" class="content-section hidden">
                <div id="tipe-box" class="space-y-4">
                    <div id="petugas-box" class="hidden bg-amber-50 p-4 rounded-3xl border border-amber-200 mb-4 text-xs font-bold">
                        <label class="text-amber-800 mb-1 block">PETUGAS PIKET</label>
                        <input type="text" id="i-petugas" class="w-full p-3 rounded-xl border-none outline-none" placeholder="Nama Petugas">
                    </div>
                    <button id="tipe-dewan" onclick="openCam('Latihan Dewan')" class="hidden w-full bg-slate-900 text-white p-6 rounded-[30px] flex justify-between shadow-xl"><span>LATIHAN DEWAN</span><i data-lucide="crown"></i></button>
                    <button onclick="openCam('Pramuka Wajib')" class="w-full bg-amber-800 text-white p-6 rounded-[30px] flex justify-between shadow-xl"><span>PRAMUKA WAJIB</span><i data-lucide="shield-check"></i></button>
                </div>
                <div id="cam-box" class="hidden text-center"><div class="rounded-[40px] overflow-hidden bg-black mb-6"><video id="video" class="w-full h-full object-cover" autoplay playsinline></video></div><button onclick="sendAbsen()" class="bg-amber-800 text-white w-full py-5 rounded-3xl font-black shadow-xl">KIRIM ABSENSI</button></div>
            </section>

            <section id="menu-profil" class="content-section hidden">
                <div class="bg-white p-8 rounded-[50px] shadow-xl text-center border relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-24 bg-amber-800"></div>
                    <div class="relative z-10 mt-6">
                        <img id="p-foto" src="https://i.ibb.co/MDv4Byw/default-user.png" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow-xl">
                        <h3 id="p-full-name" class="font-black text-lg"></h3>
                        <p id="p-role-txt" class="text-amber-800 text-[10px] font-black uppercase mb-4"></p>
                        <div id="p-stars-ui" class="flex justify-center gap-1.5 mb-6"></div>
                        <div class="grid grid-cols-2 gap-4 text-left bg-slate-50 p-5 rounded-[30px] border">
                            <div><p class="label-detil">Regu</p><p id="pp-regu" class="isi-detil">-</p></div>
                            <div><p class="label-detil">Kelas</p><p id="pp-kelas" class="isi-detil">-</p></div>
                        </div>
                        <button onclick="openModal()" class="w-full mt-8 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-lg">Edit Profil</button>
                        <button onclick="location.reload()" class="w-full mt-2 text-rose-500 font-bold text-xs uppercase">Logout</button>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-24 flex justify-around items-center rounded-t-[45px] shadow-2xl z-[200]">
            <button onclick="showMenu('home')" class="text-white opacity-60"><i data-lucide="home"></i></button>
            <button onclick="showMenu('absensi')" class="-mt-16 bg-white p-5 rounded-full shadow-2xl text-amber-950 border-8 border-slate-100"><i data-lucide="camera"></i></button>
            <button onclick="showMenu('profil')" class="text-white opacity-60"><i data-lucide="user"></i></button>
        </nav>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzplVy3RA0zTDjRYfrpKKcn4xjmEpqjHMKeNdaicZsRNkBhrJMrHLDK5X2igtvAIfWRNg/exec";
        let currentUser = null, stream = null, currentTipe = "";

        setInterval(() => {
            const n = new Date(); 
            document.getElementById('clock').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('date').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'});
        }, 1000);

        async function handleLogin() {
            const u = document.getElementById('username').value.trim(), p = document.getElementById('password').value.trim();
            const res = await fetch(`${API_URL}?action=login&username=${u}&password=${p}`).then(r => r.json());
            if(res.status === 'success') {
                currentUser = res.user; document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden'); setupApp();
            } else alert(res.message);
        }

        function setupApp() {
            lucide.createIcons();
            document.getElementById('p-full-name').innerText = currentUser.nama;
            document.getElementById('p-role-txt').innerText = currentUser.role;
            document.getElementById('pp-regu').innerText = currentUser.regu || "-";
            document.getElementById('pp-kelas').innerText = currentUser.kelas || "-";
            
            if(['Admin','Pembina','Dewan'].includes(currentUser.role)){ 
                document.getElementById('tipe-dewan').classList.remove('hidden'); 
                document.getElementById('petugas-box').classList.remove('hidden'); 
                document.getElementById('i-petugas').value = currentUser.nama;
            }
            renderS(currentUser.bintang); loadS();
        }

        function renderS(c) {
            ['stars-top', 'p-stars-ui'].forEach(id => {
                const con = document.getElementById(id); con.innerHTML = "";
                for(let i=1;i<=5;i++) con.innerHTML += `<i data-lucide="star" class="w-4 h-4 ${i <= c ? 'star-on' : 'star-off'}"></i>`;
            });
            lucide.createIcons();
        }

        async function loadS() {
            const r = await fetch(`${API_URL}?action=getDashboardData&user_id=${currentUser.user_id}`).then(r => r.json());
            document.getElementById('g-persen').innerText = r.globalPersen + "%";
        }

        function showMenu(m) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('menu-' + m).classList.remove('hidden'); stopCam();
        }

        function openCam(t) {
            currentTipe = t; document.getElementById('tipe-box').classList.add('hidden'); document.getElementById('cam-box').classList.remove('hidden');
            navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}}).then(s => { stream = s; document.getElementById('video').srcObject = s; });
        }
        function stopCam() { if(stream) stream.getTracks().forEach(t => t.stop()); }

        async function sendAbsen() {
            const p = document.getElementById('i-petugas').value, v = document.getElementById('video'), c = document.createElement('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight; c.getContext('2d').drawImage(v, 0, 0);
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(API_URL, {method: 'POST', body: JSON.stringify({
                    action: 'submitAbsensi', user_id: currentUser.user_id, nama: currentUser.nama, status: 'Hadir', tipe: currentTipe, petugas: p, lat: pos.coords.latitude, long: pos.coords.longitude, foto: c.toDataURL('image/jpeg', 0.5), kelas: currentUser.kelas
                })}).then(r => r.json());
                alert(res.message); location.reload();
            });
        }

        function openModal() { document.getElementById('e-regu').value = currentUser.regu || ""; document.getElementById('modal-edit').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('modal-edit').classList.replace('flex', 'hidden'); }
        async function saveEdit() {
            await fetch(API_URL, {method: 'POST', body: JSON.stringify({
                action: 'updateProfile', row: currentUser.row, newPass: document.getElementById('e-pass').value || null, regu: document.getElementById('e-regu').value, alamat: document.getElementById('e-alamat').value, ortu: document.getElementById('e-ortu').value, ortu_job: document.getElementById('e-kerja').value
            })});
            alert("Berhasil!"); location.reload();
        }
    </script>
</body>
</html>
