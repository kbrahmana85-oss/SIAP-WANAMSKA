<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
    :root { --p: #6F4E37; --bg: #FDF8F4; --g: #F59E0B; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; }
    .tunas-center { width: 72px; height: 72px; background: var(--p); border: 6px solid var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 10px 25px rgba(111,78,55,0.3); z-index: 1000; position: relative; }
    .nav-active { color: var(--p) !important; font-weight: 700; }
    .card-wanamska { background: white; border-radius: 30px; border: 1px solid rgba(111,78,55,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
    @keyframes load { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  </style>
</head>
<body>
  <div id="app" class="max-w-md mx-auto h-screen flex flex-col">
    <!-- LOGIN -->
    <div id="page-login" class="flex-1 flex flex-col items-center justify-center p-8">
      <img src="https://kbrahmana85-oss.github.io/SIAP-WANAMSKA/logo.png" class="w-32 mb-6 drop-shadow-2xl">
      <h1 class="text-2xl font-bold text-[#6F4E37]">SIAP WANAMSKA</h1>
      <p class="text-[10px] text-gray-400 mb-8 uppercase tracking-widest">Sistem Informasi & Absensi</p>
      <div class="w-full space-y-4">
        <div class="bg-white p-4 rounded-2xl border border-orange-100"><input type="text" id="login-id" placeholder="ID Anggota" class="w-full outline-none bg-transparent"></div>
        <div class="bg-white p-4 rounded-2xl border border-orange-100 relative">
          <input type="password" id="login-pass" placeholder="Kata Sandi" class="w-full outline-none bg-transparent pr-10">
          <button type="button" onclick="togglePass()" class="absolute right-4 top-4 text-gray-400"><i id="eye-icon" data-lucide="eye" class="w-5 h-5"></i></button>
        </div>
        <button onclick="handleLogin()" id="btn-login" class="w-full bg-[#6F4E37] text-white py-4 rounded-2xl font-bold shadow-lg">MASUK</button>
      </div>
    </div>

    <!-- MAIN UI -->
    <div id="main-ui" class="hidden flex-1 flex flex-col overflow-hidden">
      <header class="p-6 bg-white border-b border-orange-50 flex justify-between items-center sticky top-0 z-50">
        <div><p id="rt-date" class="text-[9px] text-orange-500 font-bold uppercase">Memuat...</p><h2 id="user-display-name" class="text-lg font-bold text-gray-800">-</h2></div>
        <div class="text-right"><p id="rt-clock" class="text-lg font-bold text-[#6F4E37] font-mono">00:00:00</p></div>
      </header>
      <div id="content-area" class="flex-1 overflow-y-auto p-6 pb-32"></div>
      <nav id="nav-bar" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t border-orange-50 flex justify-around items-center h-20 px-2 rounded-t-[35px] shadow-2xl z-[1000]">
        <button onclick="changePage('home')" id="nav-home" class="flex flex-col items-center gap-1 text-gray-300"><i data-lucide="layout-grid" class="w-5"></i><span class="text-[8px] font-bold">HOME</span></button>
        <button onclick="changePage('absen')" id="nav-absen" class="flex flex-col items-center gap-1 text-gray-300"><i data-lucide="camera" class="w-5"></i><span class="text-[8px] font-bold">ABSEN</span></button>
        <div onclick="showDev()" class="tunas-center"><img src="https://kbrahmana85-oss.github.io/SIAP-WANAMSKA/logo.png" class="w-10 brightness-0 invert"></div>
        <button onclick="changePage('giat')" id="nav-giat" class="flex flex-col items-center gap-1 text-gray-300"><i data-lucide="megaphone" class="w-5"></i><span class="text-[8px] font-bold">GIAT</span></button>
        <button onclick="changePage('inventaris')" id="nav-inventaris" class="flex flex-col items-center gap-1 text-gray-300"><i data-lucide="box" class="w-5"></i><span class="text-[8px] font-bold">ALAT</span></button>
      </nav>
    </div>

    <!-- MODAL CAMERA -->
    <div id="modal-cam" class="fixed inset-0 bg-black z-[2000] hidden flex flex-col">
       <div class="flex justify-between p-6 text-white items-center">
         <button onclick="closeModal()"><i data-lucide="x"></i></button>
         <h3 id="modal-title" class="font-bold text-sm uppercase">Absensi</h3>
         <button onclick="flipCamera()"><i data-lucide="refresh-cw"></i></button>
       </div>
       <div class="flex-1 flex items-center justify-center p-4">
         <div class="w-full aspect-[3/4] rounded-[40px] overflow-hidden bg-zinc-900 border-2 border-white/10 relative">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div id="qr-reader" class="hidden h-full"></div>
         </div>
       </div>
       <div class="p-10 flex justify-center">
         <button id="btn-capture" onclick="takePhoto()" class="w-20 h-20 bg-white rounded-full border-8 border-zinc-800 shadow-2xl active:scale-90 transition"></button>
       </div>
       <canvas id="canvas" class="hidden"></canvas>
    </div>
  </div>

  <script>
    let userData = null, appConfig = null, currentStream = null, isFrontCam = true, html5QrScanner = null;

    function togglePass() {
      const p = document.getElementById('login-pass'), i = document.getElementById('eye-icon');
      p.type = p.type === 'password' ? 'text' : 'password';
      i.setAttribute('data-lucide', p.type === 'password' ? 'eye' : 'eye-off');
      lucide.createIcons();
    }

    function handleLogin() {
      const id = document.getElementById('login-id').value, pass = document.getElementById('login-pass').value;
      if(!id || !pass) return Swal.fire("Eitss!", "ID dan Sandi diisi dulu ya.", "warning");
      const btn = document.getElementById('btn-login');
      btn.innerHTML = 'MEMVALIDASI...'; btn.disabled = true;
      google.script.run.withSuccessHandler(res => {
        if(res.status === "success") {
          userData = res.user;
          document.getElementById('page-login').classList.add('hidden');
          document.getElementById('main-ui').classList.remove('hidden');
          document.getElementById('nav-bar').classList.remove('hidden');
          document.getElementById('user-display-name').innerText = userData.nama;
          syncApp(); changePage('home');
        } else {
          Swal.fire("Gagal", res.message, "error"); btn.innerHTML = "MASUK"; btn.disabled = false;
        }
      }).loginUser(id, pass);
    }

    function syncApp() { google.script.run.withSuccessHandler(res => { appConfig = res; }).getAppData(userData.id); }

    function changePage(page) {
      const area = document.getElementById('content-area');
      area.innerHTML = '<div class="space-y-4"><div class="skeleton h-32 rounded-3xl"></div><div class="skeleton h-20 rounded-3xl"></div></div>';
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
      const navBtn = document.getElementById('nav-' + page);
      if(navBtn) navBtn.classList.add('nav-active');
      setTimeout(() => {
        if(page === 'home') renderHome(area);
        else if(page === 'absen') renderAbsen(area);
        else if(page === 'giat') renderGiat(area);
        else if(page === 'inventaris') renderAlat(area);
        lucide.createIcons();
      }, 400);
    }

    function renderHome(area) {
      const isAdmin = ['Admin', 'Pembina'].includes(userData.role);
      area.innerHTML = `
        <div class="card-wanamska p-6 text-center relative mb-6">
          <img src="${userData.foto || 'https://via.placeholder.com/150'}" class="w-24 h-24 rounded-full border-4 border-[#6F4E37] object-cover mx-auto mb-3">
          <h2 class="font-bold text-lg">${userData.nama}</h2>
          <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">${userData.role.replace('_',' ')}</p>
          <div id="qr-personal" class="flex justify-center my-6"></div>
          <button onclick="location.reload()" class="text-red-500 font-bold text-[10px] uppercase tracking-widest"><i data-lucide="log-out" class="inline w-3 mr-1"></i> Logout</button>
        </div>
        ${isAdmin ? '<div class="card-wanamska p-6 mb-6"><canvas id="chartPresensi"></canvas></div>' : ''}
        <h3 class="font-bold text-gray-800 text-[10px] uppercase mb-4 tracking-widest">Informasi Kehadiran</h3>
        <div id="logs-area" class="space-y-3"></div>
      `;
      new QRCode(document.getElementById("qr-personal"), { text: userData.id, width: 120, height: 120 });
      loadLogs();
      if(isAdmin) setTimeout(renderChart, 500);
    }

    function loadLogs() {
      google.script.run.withSuccessHandler(res => {
        const area = document.getElementById('logs-area');
        area.innerHTML = res.logs.map(l => `
          <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-orange-50 text-[10px]">
            <div><p class="font-bold text-[#6F4E37]">${l.tgl} • ${l.waktu}</p><p class="text-gray-500">${l.metode}</p></div>
            <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full font-black uppercase">${l.status}</span>
          </div>`).join('');
      }).getPersonalLogs(userData.id);
    }

    function renderChart() {
      new Chart(document.getElementById('chartPresensi'), {
        type: 'doughnut',
        data: { labels: ['Pembina', 'Dewan', 'Anggota'], datasets: [{ data: [appConfig.stats.pembina, appConfig.stats.dewan, appConfig.stats.penggalang], backgroundColor: ['#6F4E37', '#F59E0B', '#FCD34D'], borderWidth: 0 }] },
        options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
      });
    }

    function renderAbsen(area) {
      let html = `<h2 class="text-lg font-bold text-gray-800 mb-6 uppercase tracking-tight">Presensi</h2><div class="space-y-4">`;
      if(userData.role !== 'Penggalang') {
        html += `<button onclick="startScanner()" class="w-full card-wanamska p-5 flex items-center gap-4 text-left"><div class="bg-orange-100 p-3 rounded-2xl text-orange-600"><i data-lucide="qr-code"></i></div><div><p class="font-bold text-sm">Scan QR Anggota</p><p class="text-[9px] text-gray-400 font-bold uppercase">Validasi Petugas</p></div></button>`;
      }
      if(userData.role === 'Dewan_Penggalang') {
        html += `<button onclick="startGeoAbsen('Latihan Wajib')" class="w-full card-wanamska p-5 flex items-center gap-4 text-left"><div class="bg-blue-100 p-3 rounded-2xl text-blue-600"><i data-lucide="shield"></i></div><div><p class="font-bold text-sm">Latihan Wajib</p><p class="text-[9px] text-gray-400 font-bold uppercase">Khusus Dewan</p></div></button>`;
      }
      html += `<button onclick="startGeoAbsen('Pramuka Wajib')" class="w-full card-wanamska p-5 flex items-center gap-4 text-left"><div class="bg-green-100 p-3 rounded-2xl text-green-600"><i data-lucide="map-pin"></i></div><div><p class="font-bold text-sm">Pramuka Wajib</p><p class="text-[9px] text-gray-400 font-bold uppercase">Absen Mingguan</p></div></button></div>`;
      area.innerHTML = html;
    }

    function startGeoAbsen(type) {
      Swal.fire({ title: 'Memvalidasi Lokasi...', didOpen: () => Swal.showLoading() });
      navigator.geolocation.getCurrentPosition(pos => {
        const d = calcDist(pos.coords.latitude, pos.coords.longitude, appConfig.config.lat, appConfig.config.long);
        if(appConfig.config.active === "On" && d > appConfig.config.radius) {
          Swal.fire("Gagal", `Jarak: ${Math.round(d)}m. Maks: 50m.`, "error");
        } else {
          Swal.close(); openModal('camera', type, pos);
        }
      }, () => Swal.fire("GPS Mati", "Aktifkan GPS Anda", "error"), { enableHighAccuracy: true });
    }

    function calcDist(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function openModal(mode, type, pos) {
      const modal = document.getElementById('modal-cam');
      modal.style.display = 'flex'; document.getElementById('modal-title').innerText = type;
      if(mode === 'camera') {
        document.getElementById('video').classList.remove('hidden'); document.getElementById('btn-capture').classList.remove('hidden');
        document.getElementById('qr-reader').classList.add('hidden');
        const c = { video: { facingMode: isFrontCam ? "user" : "environment" } };
        currentStream = await navigator.mediaDevices.getUserMedia(c);
        document.getElementById('video').srcObject = currentStream;
        window.curPos = pos;
      }
    }

    function closeModal() { if(currentStream) currentStream.getTracks().forEach(t => t.stop()); if(html5QrScanner) html5QrScanner.stop(); document.getElementById('modal-cam').style.display = 'none'; }
    function flipCamera() { isFrontCam = !isFrontCam; closeModal(); openModal('camera', document.getElementById('modal-title').innerText, window.curPos); }

    function takePhoto() {
      const v = document.getElementById('video'), c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      c.getContext('2d').drawImage(v, 0, 0);
      const b64 = c.toDataURL('image/jpeg', 0.5);
      closeModal();
      Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      google.script.run.withSuccessHandler(() => { Swal.fire("Berhasil", "Kehadiran dicatat", "success"); changePage('home'); })
      .submitAbsensi({user_id:userData.id, nama:userData.nama, status:'Hadir', jenis:document.getElementById('modal-title').innerText, petugas:(userData.role!=='Penggalang'?userData.nama:'-'), lokasi:window.curPos.coords.latitude+','+window.curPos.coords.longitude, fotoBase64:b64, metode:'Geo-Selfie', kelas:userData.kelas});
    }

    function startScanner() {
      openModal('qr', 'SCAN QR ANGGOTA');
      document.getElementById('video').classList.add('hidden'); document.getElementById('btn-capture').classList.add('hidden');
      document.getElementById('qr-reader').classList.remove('hidden');
      html5QrScanner = new Html5Qrcode("qr-reader");
      html5QrScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
        html5QrScanner.stop(); closeModal();
        google.script.run.withSuccessHandler(() => { Swal.fire("Sukses", `ID: ${txt} divalidasi`, "success"); })
        .submitAbsensi({user_id:txt, nama:'QR Siswa', status:'Hadir', jenis:'Pramuka Wajib', petugas:userData.nama, lokasi:'Piket', metode:'QR-Scan', kelas:'-'});
      });
    }

    function renderGiat(area) {
      area.innerHTML = `<h2 class="text-lg font-bold mb-6 uppercase">Kegiatan</h2><div id="list-giat" class="space-y-4"></div>`;
      google.script.run.withSuccessHandler(data => {
        document.getElementById('list-giat').innerHTML = data.map(g => `
          <div class="card-wanamska overflow-hidden">
            <img src="${g[5] || 'https://via.placeholder.com/400x200'}" class="w-full h-40 object-cover">
            <div class="p-5">
              <span class="text-[9px] font-bold text-orange-600 uppercase bg-orange-50 px-2 py-1 rounded-lg">${g[3]}</span>
              <h3 class="font-bold text-gray-800 mt-2">${g[1]}</h3>
              <button onclick="genPDF('${g[1]}','${g[4]}','${g[2]}')" class="w-full py-3 mt-4 border border-orange-100 rounded-xl text-[9px] font-bold text-[#6F4E37] uppercase">Unduh PDF</button>
            </div>
          </div>`).join('');
      }).getKegiatan();
    }

    function genPDF(t, d, dt) {
      const { jsPDF } = window.jspdf; const doc = new jsPDF();
      doc.setFontSize(20); doc.setTextColor(111, 78, 55); doc.text("LAPORAN KEGIATAN", 105, 20, {align:'center'});
      doc.setFontSize(14); doc.setTextColor(0); doc.text(t, 20, 45);
      doc.setFontSize(10); doc.text(doc.splitTextToSize(d, 170), 20, 55);
      doc.save(`SIAP_${t}.pdf`);
    }

    function renderAlat(area) {
      area.innerHTML = `<h2 class="text-lg font-bold mb-6 uppercase">Inventaris</h2><div id="list-alat" class="space-y-3"></div>`;
      google.script.run.withSuccessHandler(data => {
        document.getElementById('list-alat').innerHTML = data.map(i => `
          <div class="bg-white p-5 rounded-[25px] flex justify-between items-center shadow-sm border border-orange-50">
            <div><p class="font-bold text-gray-800 text-sm">${i[1]}</p><p class="text-[8px] text-gray-400 font-bold uppercase">${i[4]}</p></div>
            <div class="text-right font-bold text-[#6F4E37] text-lg">${i[2]}</div>
          </div>`).join('');
      }).getInventarisData();
    }

    function showDev() {
      Swal.fire({
        title: 'SIAP WANAMSKA',
        html: `<div class="text-center"><img src="https://kbrahmana85-oss.github.io/SIAP-WANAMSKA/logo.png" class="w-16 mx-auto mb-4">
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 italic">Sistem Informasi & Absensi Penggalang</p>
          <div class="bg-gray-50 p-4 rounded-3xl text-left text-[11px] space-y-1">
            <p><strong>Developer:</strong> ARIF NUUR ISWAHYUDI, S.Pd</p>
            <p><strong>Jabatan:</strong> Pembina Pramuka Putra</p>
            <p><strong>Instansi:</strong> SMP Negeri 26 Kota Surakarta</p>
            <p class="text-gray-400 text-center mt-4 uppercase font-black">© est.2026</p>
          </div></div>`,
        confirmButtonColor: '#6F4E37'
      });
    }

    window.onload = () => {
      lucide.createIcons(); setInterval(() => {
        const c = document.getElementById('rt-clock'); if(c) c.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false});
      }, 1000);
      window.onpopstate = () => { if(document.getElementById('modal-cam').style.display === 'flex') closeModal(); };
    };
  </script>
</body>
</html>
