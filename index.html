<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>SIAP WANAMSKA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6F4E37">
  <link rel="apple-touch-icon" href="logo.png">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #FDF8F4; }
    iframe { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>
  <!-- GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE SCRIPT ANDA -->
  <iframe src="https://script.google.com/macros/s/AKfycbzankirQb4eFT6bbz7OVEMCMiWK1XBn1pqq4ErnLPbwTr9_O7pvmbq4qkFeRwF5d5ph/exec"></iframe>

  <script>
    // Daftarkan Service Worker agar PWA bisa diinstal
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW Registered!'))
          .catch(err => console.log('SW Failed!', err));
      });
    }
  </script>
</body>
</html>
