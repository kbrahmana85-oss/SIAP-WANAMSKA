<<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta untuk tampilan Full Screen di HP -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>SIAP WANAMSKA</title>
    
    <!-- Menghubungkan ke file Langkah 4 Bapak -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #FDF8F4; /* Warna latar belakang aplikasi */
        }
        /* Iframe ini adalah jendela yang menampilkan Aplikasi GAS Bapak */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <!-- KUNCI INTEGRASI: Ganti URL di bawah ini dengan URL Web App GAS Bapak -->
    <iframe 
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbyGFxe0Avuo2FGy-9HWoc7iOMtDPJDQd8fzfmca6ZsbfJc3S_rqYq16KZ9Bf39ezJ_U/exec" 
        allow="geolocation; camera; microphone;">
    </iframe>

    <script>
        // Mendaftarkan Service Worker agar aplikasi bisa diinstal & support offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Sistem Offline WANAMSKA Siap.'))
                .catch(err => console.log('Gagal mendaftarkan sistem offline.', err));
            });
        }

        // Mencegah Pull-to-refresh agar aplikasi terasa seperti APK asli
        window.addEventListener('load', function() {
            document.body.addEventListener('touchstart', function(e) {
                if (e.touches.length > 1) e.preventDefault();
            }, {passive: false});
        });
    </script>
</body>
</html>

  <div id="app" class="max-w-md mx-auto min-h-screen pb-24">
    
    <!-- LOGIN PAGE -->
    <div id="page-login" class="flex flex-col items-center justify-center min-h-screen p-8">
      <img src="logo.png" class="w-32 mb-6 drop-shadow-2xl">
      <h1 class="text-2xl font-bold text-[#6F4E37]">SIAP WANAMSKA</h1>
      <p class="text-xs text-gray-400 mb-8 tracking-widest uppercase">System v1.0 • Performance Optimized</p>
      
      <div class="w-full space-y-4">
        <div class="bg-white p-4 rounded-2xl border border-orange-50 shadow-sm">
          <input type="text" id="login-id" placeholder="ID Anggota" class="w-full outline-none bg-transparent">
        </div>
        <div class="bg-white p-4 rounded-2xl border border-orange-50 shadow-sm">
          <input type="password" id="login-pass" placeholder="Kata Sandi" class="w-full outline-none bg-transparent">
        </div>
        <div class="flex items-center ml-2">
          <input type="checkbox" id="show-pass" class="mr-2 accent-[#6F4E37]" onclick="const p = document.getElementById('login-pass'); p.type = p.type === 'password' ? 'text' : 'password'">
          <label for="show-pass" class="text-xs text-gray-500 font-semibold">Lihat Sandi</label>
        </div>
        <button onclick="handleLogin()" id="btn-login" class="w-full bg-[#6F4E37] text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition">MASUK</button>
      </div>
    </div>

    <!-- MAIN UI -->
    <div id="main-ui" class="hidden">
      <!-- HEADER -->
      <div class="p-6 bg-white rounded-b-[45px] shadow-sm mb-6 border-b border-orange-50 sticky top-0 z-50">
        <div class="flex justify-between items-center">
          <div>
            <p id="greet-time" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Selamat Datang</p>
            <h2 id="user-display-name" class="text-lg font-extrabold text-gray-800">-</h2>
          </div>
          <div class="text-right bg-orange-50 p-2.5 px-4 rounded-2xl border border-orange-100">
            <p id="realtime-clock" class="text-lg font-bold text-[#6F4E37] leading-none">00:00:00</p>
            <p id="realtime-date" class="text-[8px] text-orange-400 font-black uppercase tracking-tighter mt-1">SABTU, 11 MEI 2024</p>
          </div>
        </div>
      </div>

      <!-- CONTENT LOADER -->
      <div id="content-area" class="px-6 space-y-6"></div>
    </div>

    <!-- NAVIGATION BAR -->
    <nav id="nav-bar" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto glass border-t border-orange-100 flex justify-around items-center h-20 px-4 rounded-t-[35px] z-[100] shadow-2xl">
      <button onclick="changePage('home')" class="nav-item flex flex-col items-center gap-1 text-gray-400 active">
        <i data-lucide="layout-grid" class="w-5"></i><span class="text-[9px] font-bold">HOME</span>
      </button>
      <button onclick="changePage('absen')" class="nav-item flex flex-col items-center gap-1 text-gray-400">
        <i data-lucide="camera" class="w-5"></i><span class="text-[9px] font-bold">ABSEN</span>
      </button>
      <button onclick="changePage('profile')" class="tunas-center">
        <img src="logo.png" class="w-10 brightness-0 invert">
      </button>
      <button onclick="changePage('giat')" class="nav-item flex flex-col items-center gap-1 text-gray-400">
        <i data-lucide="megaphone" class="w-5"></i><span class="text-[9px] font-bold">GIAT</span>
      </button>
      <button onclick="changePage('inventaris')" class="nav-item flex flex-col items-center gap-1 text-gray-400">
        <i data-lucide="box" class="w-5"></i><span class="text-[9px] font-bold">ALAT</span>
      </button>
    </nav>

    <!-- MODAL ENGINE -->
    <div id="modal-container" class="fixed inset-0 bg-black/95 z-[200] hidden flex flex-col">
       <div class="flex justify-between p-6 text-white">
         <button onclick="closeModal()"><i data-lucide="chevron-left"></i></button>
         <h3 id="modal-title" class="font-bold uppercase tracking-widest text-sm">Validasi</h3>
         <button onclick="flipCamera()"><i data-lucide="refresh-ccw"></i></button>
       </div>
       <div class="flex-1 flex items-center justify-center px-6">
         <div class="w-full aspect-square rounded-[40px] overflow-hidden bg-zinc-900 border-4 border-white/10 shadow-2xl relative">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div id="qr-reader" class="hidden h-full"></div>
         </div>
       </div>
       <div class="p-12 flex justify-center">
         <button id="btn-capture" onclick="takePhoto()" class="w-20 h-20 bg-white rounded-full border-[6px] border-zinc-700 shadow-2xl active:scale-90 transition"></button>
       </div>
       <canvas id="canvas" class="hidden"></canvas>
    </div>

  </div>

  <script>
    let userData = null;
    let appConfig = null;
    let currentStream = null;
    let isFrontCam = true;
    let html5QrScanner = null;

    // --- UTILS & CLOCK ---
    function updateClock() {
      const now = new Date();
      document.getElementById('realtime-clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('realtime-date').innerText = now.toLocaleDateString('id-ID', options).toUpperCase();
    }

    // --- CORE LOGIC ---
    function handleLogin() {
      const id = document.getElementById('login-id').value;
      const pass = document.getElementById('login-pass').value;
      if(!id || !pass) return Swal.fire("Peringatan", "ID dan Sandi harus diisi", "warning");

      const btn = document.getElementById('btn-login');
      btn.innerHTML = 'MEMVALIDASI...';
      btn.disabled = true;

      google.script.run.withSuccessHandler(res => {
        if(res.status === "success") {
          userData = res.user;
          document.getElementById('page-login').classList.add('hidden');
          document.getElementById('main-ui').classList.remove('hidden');
          document.getElementById('nav-bar').classList.remove('hidden');
          document.getElementById('user-display-name').innerText = userData.nama;
          syncApp();
          changePage('home');
        } else {
          Swal.fire("Gagal", res.message, "error");
          btn.innerHTML = "MASUK";
          btn.disabled = false;
        }
      }).loginUser(id, pass);
    }

    function syncApp() {
      google.script.run.withSuccessHandler(res => {
        appConfig = res.config;
        if(document.getElementById('content-area')) refreshDashboard(res.stats);
      }).getAppData();
    }

    function changePage(page) {
      const area = document.getElementById('content-area');
      area.innerHTML = '';
      
      // Update Nav
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      
      if(page === 'home') {
        renderHome(area);
      } else if(page === 'absen') {
        renderAbsen(area);
      } else if(page === 'profile') {
        renderProfile(area);
      } else if(page === 'giat') {
        renderGiat(area);
      } else if(page === 'inventaris') {
        renderAlat(area);
      }
      lucide.createIcons();
    }

    // --- RENDER PAGES ---
    function renderHome(area) {
      area.innerHTML = `
        <div class="card-modern p-6 bg-gradient-to-br from-[#6F4E37] to-[#8d6e63] text-white">
          <div class="flex justify-between items-center">
            <div><p class="text-[10px] opacity-80 font-bold uppercase">Status Kehadiran</p><h4 class="font-bold text-lg">Siap Latihan</h4></div>
            <i data-lucide="shield-check" class="w-8 h-8 opacity-50"></i>
          </div>
        </div>
        <div id="stats-container"></div>
        <h3 class="font-bold text-gray-800 text-sm mb-4">LOG AKTIVITAS TERAKHIR</h3>
        <div id="logs-area" class="space-y-3">Memuat riwayat...</div>
      `;
      syncApp();
      loadLogs();
    }

    function refreshDashboard(stats) {
      if (userData.role === 'Admin' || userData.role === 'Pembina') {
        const container = document.getElementById('stats-container');
        if(!container) return;
        container.innerHTML = `
          <div class="card-modern p-6 flex flex-col items-center">
            <canvas id="chartPresensi" width="180" height="180"></canvas>
            <div class="grid grid-cols-3 gap-4 mt-6 w-full text-center">
              <div><p class="text-[8px] text-gray-400 font-bold">PEMBINA</p><p class="font-bold text-[#6F4E37]">${stats.pembina}</p></div>
              <div><p class="text-[8px] text-gray-400 font-bold">DEWAN</p><p class="font-bold text-orange-500">${stats.dewan}</p></div>
              <div><p class="text-[8px] text-gray-400 font-bold">ANGGOTA</p><p class="font-bold text-amber-400">${stats.penggalang}</p></div>
            </div>
          </div>
        `;
        const ctx = document.getElementById('chartPresensi').getContext('2d');
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            datasets: [{
              data: [stats.pembina, stats.dewan, stats.penggalang],
              backgroundColor: ['#6F4E37', '#F59E0B', '#FCD34D'],
              borderWidth: 0
            }]
          },
          options: { cutout: '80%', plugins: { legend: { display: false } } }
        });
      }
    }

    function loadLogs() {
      google.script.run.withSuccessHandler(logs => {
        const area = document.getElementById('logs-area');
        if(!area) return;
        area.innerHTML = logs.map(l => `
          <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-orange-50">
            <div><p class="text-[10px] font-bold text-[#6F4E37]">${l.tgl} • ${l.waktu}</p><p class="text-xs font-bold text-gray-700">${l.metode}</p></div>
            <span class="text-[9px] font-black px-3 py-1 bg-green-50 text-green-600 rounded-full">${l.status}</span>
          </div>
        `).join('');
      }).getPersonalLogs(userData.id);
    }

    function renderAbsen(area) {
      let html = `<h2 class="text-lg font-bold text-gray-800 mb-6">MENU PRESENSI</h2><div class="space-y-4">`;
      if(userData.role !== 'Penggalang') {
        html += `<button onclick="startScanner()" class="w-full card-modern p-5 flex items-center gap-4 text-left">
          <div class="bg-orange-100 p-3 rounded-2xl text-orange-600"><i data-lucide="qr-code"></i></div>
          <div><p class="font-bold text-sm">Scan QR Anggota</p><p class="text-[9px] text-gray-400">Gunakan untuk validasi hadir siswa</p></div>
        </button>`;
      }
      if(userData.role === 'Dewan_Penggalang') {
        html += `<button onclick="startGeoAbsen('Latihan Wajib')" class="w-full card-modern p-5 flex items-center gap-4 text-left">
          <div class="bg-blue-100 p-3 rounded-2xl text-blue-600"><i data-lucide="shield"></i></div>
          <div><p class="font-bold text-sm">Latihan Wajib</p><p class="text-[9px] text-gray-400">Sesi khusus Dewan Penggalang</p></div>
        </button>`;
      }
      html += `<button onclick="startGeoAbsen('Pramuka Wajib')" class="w-full card-modern p-5 flex items-center gap-4 text-left">
        <div class="bg-green-100 p-3 rounded-2xl text-green-600"><i data-lucide="map-pin"></i></div>
        <div><p class="font-bold text-sm">Pramuka Wajib</p><p class="text-[9px] text-gray-400">Absensi latihan rutin mingguan</p></div>
      </button></div>`;
      area.innerHTML = html;
    }

    // --- GEOFENCING ENGINE ---
    function startGeoAbsen(type) {
      Swal.fire({ title: 'Memvalidasi Lokasi...', didOpen: () => Swal.showLoading() });
      navigator.geolocation.getCurrentPosition(pos => {
        const dist = calcDist(pos.coords.latitude, pos.coords.longitude, appConfig.lat, appConfig.long);
        if(appConfig.active === "On" && dist > appConfig.radius) {
          Swal.fire("Diluar Jangkauan", `Jarak Anda ${Math.round(dist)}m. Maksimal radius ${appConfig.radius}m.`, "error");
        } else {
          Swal.close();
          openModal('camera', type);
        }
      }, () => Swal.fire("GPS Gagal", "Aktifkan GPS Anda", "error"));
    }

    function calcDist(lat1, lon1, lat2, lon2) {
      const R = 6371e3;
      const dLat = (lat2-lat1)*Math.PI/180;
      const dLon = (lon2-lon1)*Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- CAMERA & SCANNER ---
    async function openModal(mode, type) {
      const modal = document.getElementById('modal-container');
      modal.style.display = 'flex';
      document.getElementById('modal-title').innerText = type;
      window.history.pushState({modal: 'open'}, "");

      if(mode === 'camera') {
        document.getElementById('video').classList.remove('hidden');
        document.getElementById('btn-capture').classList.remove('hidden');
        document.getElementById('qr-reader').classList.add('hidden');
        const constraints = { video: { facingMode: isFrontCam ? "user" : "environment" } };
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById('video').srcObject = currentStream;
      }
    }

    function closeModal() {
      if(currentStream) currentStream.getTracks().forEach(t => t.stop());
      if(html5QrScanner) html5QrScanner.stop();
      document.getElementById('modal-container').style.display = 'none';
    }

    function flipCamera() {
      isFrontCam = !isFrontCam;
      closeModal();
      openModal('camera', document.getElementById('modal-title').innerText);
    }

    function takePhoto() {
      const v = document.getElementById('video');
      const c = document.getElementById('canvas');
      c.width = v.videoWidth; c.height = v.videoHeight;
      c.getContext('2d').drawImage(v, 0, 0);
      const b64 = c.toDataURL('image/jpeg', 0.5);
      closeModal();
      sendAbsensi(b64);
    }

    function sendAbsensi(img) {
      Swal.fire({ title: 'Menyimpan Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      const payload = {
        user_id: userData.id, nama: userData.nama, status: 'Hadir',
        jenis: document.getElementById('modal-title').innerText,
        petugas: (userData.role !== 'Penggalang' ? userData.nama : '-'),
        lokasi: 'Terverifikasi GPS', fotoBase64: img, metode: 'Geo-Selfie', kelas: userData.kelas
      };
      google.script.run.withSuccessHandler(() => {
        Swal.fire("Berhasil", "Kehadiran Anda telah dicatat", "success");
        changePage('home');
      }).submitAbsensi(payload);
    }

    function startScanner() {
      openModal('qr', 'SCAN QR ANGGOTA');
      document.getElementById('video').classList.add('hidden');
      document.getElementById('btn-capture').classList.add('hidden');
      document.getElementById('qr-reader').classList.remove('hidden');
      html5QrScanner = new Html5Qrcode("qr-reader");
      html5QrScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
        html5QrScanner.stop();
        closeModal();
        google.script.run.withSuccessHandler(() => {
          Swal.fire("Sukses", `Anggota ID: ${txt} berhasil divalidasi hadir`, "success");
        }).submitAbsensi({user_id:txt, nama:'Via Scanner', status:'Hadir', jenis:'Pramuka Wajib', petugas:userData.nama, lokasi:'Titik Piket', metode:'QR-Scan', kelas:'-'});
      });
    }

    // --- OTHER PAGES ---
    function renderProfile(area) {
      area.innerHTML = `
        <div class="card-modern p-8 text-center">
          <img src="${userData.foto || 'logo.png'}" class="w-32 h-32 rounded-full mx-auto border-4 border-[#6F4E37] object-cover mb-4">
          <h2 class="font-extrabold text-xl">${userData.nama}</h2>
          <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${userData.role.replace('_',' ')}</p>
          <div id="qr-mandiri" class="flex justify-center my-8"></div>
          <div class="text-left space-y-3 bg-orange-50 p-6 rounded-3xl border border-orange-100">
             <div class="flex justify-between text-[10px]"><span class="font-bold text-gray-400 uppercase">NTA</span><span class="font-bold text-gray-800">${userData.nta}</span></div>
             <div class="flex justify-between text-[10px]"><span class="font-bold text-gray-400 uppercase">Regu/Kelas</span><span class="font-bold text-gray-800">${userData.regu} / ${userData.kelas}</span></div>
             <div class="flex justify-between text-[10px]"><span class="font-bold text-gray-400 uppercase">Wali</span><span class="font-bold text-gray-800">${userData.wali}</span></div>
          </div>
          <button onclick="location.reload()" class="mt-8 text-red-400 font-bold text-xs">LOGOUT SYSTEM</button>
        </div>
      `;
      new QRCode(document.getElementById("qr-mandiri"), { text: userData.id, width: 160, height: 160 });
    }

    function renderGiat(area) {
      area.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-lg font-bold">INFO KEGIATAN</h2>${userData.role !== 'Penggalang' ? '<button onclick="formKegiatan()" class="bg-[#6F4E37] text-white px-4 py-2 rounded-xl text-[10px] font-bold">+ BARU</button>':''}</div><div id="list-giat" class="space-y-4"></div>`;
      google.script.run.withSuccessHandler(data => {
        document.getElementById('list-giat').innerHTML = data.map(g => `
          <div class="card-modern overflow-hidden">
            <img src="${g[5] || 'logo.png'}" class="w-full h-40 object-cover">
            <div class="p-5">
              <div class="flex justify-between text-[10px] mb-2"><span class="font-bold text-orange-600 uppercase">${g[3]}</span><span class="text-gray-400">${g[2]}</span></div>
              <h3 class="font-bold text-gray-800 mb-3">${g[1]}</h3>
              <button onclick="genPDF('${g[1]}','${g[4]}','${g[2]}')" class="w-full py-3 border border-orange-100 rounded-xl text-[10px] font-bold text-[#6F4E37]"><i data-lucide="file-text" class="inline w-3 mr-1"></i> UNDUH PDF</button>
            </div>
          </div>
        `).join('');
        lucide.createIcons();
      }).getKegiatan();
    }

    function genPDF(t, d, dt) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(20); doc.setTextColor(111, 78, 55); doc.text("LAPORAN KEGIATAN", 105, 20, {align:'center'});
      doc.setFontSize(10); doc.setTextColor(100); doc.text(dt, 20, 35);
      doc.setFontSize(14); doc.setTextColor(0); doc.text(t, 20, 45);
      doc.setFontSize(11); doc.text(doc.splitTextToSize(d, 170), 20, 55);
      doc.save(`SIAP_${t}.pdf`);
    }

    function renderAlat(area) {
      area.innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-lg font-bold">INVENTARIS</h2><button onclick="formAlat()" class="bg-[#6F4E37] text-white px-4 py-2 rounded-xl text-[10px] font-bold">+ TAMBAH</button></div><div id="list-alat" class="space-y-3"></div>`;
      google.script.run.withSuccessHandler(data => {
        document.getElementById('list-alat').innerHTML = data.map(i => `
          <div class="bg-white p-5 rounded-[25px] flex justify-between items-center shadow-sm border border-orange-50">
            <div><p class="font-bold text-gray-800 text-sm">${i[1]}</p><p class="text-[8px] text-gray-400 font-bold uppercase">${i[4]}</p></div>
            <div class="text-right"><p class="text-[8px] font-bold ${i[3]==='Baik'?'text-green-500':'text-red-500'} uppercase">${i[3]}</p><p class="font-bold text-[#6F4E37] text-lg">${i[2]}</p></div>
          </div>
        `).join('');
      }).getInventarisData();
    }

    // --- STARTUP ---
    window.onload = () => {
      lucide.createIcons();
      updateClock();
      setInterval(updateClock, 1000);
      window.onpopstate = () => {
        if(document.getElementById('modal-container').style.display === 'flex') closeModal();
      };
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js');
      }
    };
  </script>
</body>
</html>
