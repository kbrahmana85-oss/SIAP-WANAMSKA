<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAP WANAMSKA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .bottom-nav { background: #6F4E37; }
        body { background-color: #f3f4f6; padding-bottom: 90px; font-family: sans-serif; }
        .content-section { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- HALAMAN LOGIN -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center border-t-8 border-amber-800">
            <img src="https://i.ibb.co/vz6W7rX/logo-pramuka.png" alt="Logo" class="w-24 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">SIAP WANAMSKA</h1>
            <p class="text-gray-500 mb-6 text-sm">Sistem Absensi Penggalang</p>
            <input type="text" id="username" placeholder="User ID / NISN" class="w-full p-3 mb-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-6 border rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-800">
            <button onclick="handleLogin()" id="login-btn" class="w-full bg-amber-800 text-white p-3 rounded-lg font-bold hover:bg-amber-900 transition shadow-lg">MASUK</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <header class="bg-amber-800 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
            <div class="flex items-center gap-2">
                <img src="https://i.ibb.co/vz6W7rX/logo-pramuka.png" class="w-8 h-8 brightness-200">
                <span class="font-bold tracking-wider text-sm">SIAP WANAMSKA</span>
            </div>
            <div id="user-info" class="text-right">
                <p id="display-name" class="font-bold text-xs leading-tight"></p>
                <p id="display-role" class="text-[9px] opacity-80 uppercase tracking-widest"></p>
            </div>
        </header>

        <main class="p-4 max-w-md mx-auto">
            <!-- BERANDA -->
            <section id="menu-home" class="content-section">
                <h2 class="text-lg font-bold mb-4 text-gray-700 flex items-center gap-2"><i data-lucide="bar-chart-3" class="w-5 h-5"></i> Dashboard</h2>
                <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 flex flex-col items-center">
                    <div class="w-full max-w-[180px]"><canvas id="attendanceChart"></canvas></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded-xl">
                        <p class="text-[10px] uppercase font-bold text-green-600">Hadir</p>
                        <p id="stat-hadir" class="text-2xl font-black text-green-800">0</p>
                    </div>
                    <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl">
                        <p class="text-[10px] uppercase font-bold text-red-600">Alpa</p>
                        <p id="stat-alpa" class="text-2xl font-black text-red-800">0</p>
                    </div>
                </div>
            </section>

            <!-- KEGIATAN -->
            <section id="menu-kegiatan" class="content-section hidden">
                <h2 class="text-lg font-bold mb-4 text-gray-700">Agenda & Berita</h2>
                <div id="list-kegiatan" class="space-y-4"><p class="text-center text-gray-400">Memuat...</p></div>
            </section>

            <!-- ABSENSI -->
            <section id="menu-absensi" class="content-section hidden">
                <div id="view-peserta" class="hidden text-center">
                    <h2 class="text-lg font-bold mb-4">Selfie & Lokasi</h2>
                    <video id="video" class="w-full rounded-2xl bg-black mb-4" autoplay playsinline></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <p id="location-status" class="text-xs mb-4 text-gray-500">Melacak lokasi...</p>
                    <button id="btn-absen" onclick="takeAttendance()" class="bg-amber-800 text-white w-full py-4 rounded-xl font-bold">KIRIM ABSENSI</button>
                </div>
                <div id="view-others" class="hidden text-center py-10 text-gray-500">Menu khusus Peserta</div>
            </section>

            <!-- PROFIL -->
            <section id="menu-profil" class="content-section hidden text-center">
                <div class="bg-white p-6 rounded-3xl shadow-sm">
                    <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto mb-4 overflow-hidden border-4 border-amber-800">
                        <img id="profile-img" src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-full">
                    </div>
                    <h3 id="profile-name" class="font-bold text-lg"></h3>
                    <p id="profile-role" class="text-amber-800 text-xs font-bold uppercase tracking-widest mb-6"></p>
                    <div class="bg-gray-50 p-4 inline-block rounded-xl border"><img id="qr-img" class="w-32 h-32"></div>
                    <button onclick="location.reload()" class="block w-full mt-8 text-red-500 font-bold text-sm bg-red-50 py-3 rounded-xl">KELUAR</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex justify-around items-center text-white text-[10px] rounded-t-3xl shadow-2xl z-[100]">
            <button onclick="showMenu('home')" class="flex flex-col items-center opacity-70"><i data-lucide="home"></i><span>Beranda</span></button>
            <button onclick="showMenu('kegiatan')" class="flex flex-col items-center opacity-70"><i data-lucide="book-open"></i><span>Kegiatan</span></button>
            <button onclick="showMenu('absensi')" class="flex flex-col items-center -mt-12 bg-amber-500 p-4 rounded-full border-4 border-white text-amber-950"><i data-lucide="map-pin"></i></button>
            <button onclick="showMenu('profil')" class="flex flex-col items-center opacity-70"><i data-lucide="user"></i><span>Profil</span></button>
        </nav>
    </div>

    <script>
        // API URL YANG SUDAH DIBETULKAN (DENGAN HURUF 'z')
        const API_URL = "https://script.google.com/macros/s/AKfycbzplVy3RA0zTDjRYfrpKKcn4xjmEpqjHMKeNdaicZsRNkBhrJMrHLDK5X2igtvAIfWRNg/exec";
        
        let currentUser = null;
        let schoolSettings = null;
        let stream = null;

        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');

            if(!user || !pass) return alert("Isi User ID & Password!");
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            try {
                const resp = await fetch(`${API_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`);
                const res = await resp.json();

                if(res.status === 'success') {
                    currentUser = res.user;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    setupApp();
                } else {
                    alert("Gagal: " + res.message);
                }
            } catch (e) {
                alert("Gangguan koneksi database. Periksa URL API.");
            } finally {
                btn.innerText = "MASUK";
                btn.disabled = false;
            }
        }

        async function setupApp() {
            lucide.createIcons();
            document.getElementById('display-name').innerText = currentUser.nama;
            document.getElementById('display-role').innerText = currentUser.role;
            document.getElementById('profile-name').innerText = currentUser.nama;
            document.getElementById('profile-role').innerText = currentUser.role;
            document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${currentUser.qr}`;
            
            if(currentUser.role === 'Peserta') {
                document.getElementById('view-peserta').classList.remove('hidden');
            } else {
                document.getElementById('view-others').classList.remove('hidden');
            }

            try {
                const rs = await fetch(`${API_URL}?action=getSettings`);
                schoolSettings = await rs.json();
            } catch(e) {}

            loadStats();
            loadKegiatan();
        }

        function showMenu(m) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.add('hidden'));
            document.getElementById('menu-' + m).classList.remove('hidden');
            if(m === 'absensi' && currentUser.role === 'Peserta') startCamera();
            else stopCamera();
            lucide.createIcons();
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('video').srcObject = stream;
            } catch(e) { alert("Kamera gagal diakses."); }
        }

        function stopCamera() {
            if(stream) stream.getTracks().forEach(t => t.stop());
        }

        async function takeAttendance() {
            const btn = document.getElementById('btn-absen');
            btn.disabled = true; btn.innerText = "Memproses...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;

                const canvas = document.getElementById('canvas');
                const video = document.getElementById('video');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const foto = canvas.toDataURL('image/jpeg', 0.5);

                try {
                    const resp = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'submitAbsensi',
                            user_id: currentUser.user_id,
                            nama: currentUser.nama,
                            status: 'Hadir',
                            lat: lat, long: lng,
                            foto: foto, metode: 'GPS-PWA'
                        })
                    });
                    const res = await resp.json();
                    alert(res.message);
                    showMenu('home'); loadStats();
                } catch(e) { alert("Gagal kirim data."); }
                finally { btn.disabled = false; btn.innerText = "KIRIM ABSENSI"; }
            }, () => { alert("Aktifkan GPS!"); btn.disabled = false; btn.innerText = "KIRIM ABSENSI"; });
        }

        async function loadStats() {
            try {
                const rs = await fetch(`${API_URL}?action=getDashboardData`);
                const st = await rs.json();
                document.getElementById('stat-hadir').innerText = st.hadir;
                const total = (st.total_peserta || 0) + (st.total_dewan || 0);
                document.getElementById('stat-alpa').innerText = total > 0 ? (total - st.hadir - st.izin - st.sakit) : 0;
                
                new Chart(document.getElementById('attendanceChart'), {
                    type: 'doughnut',
                    data: {
                        datasets: [{ 
                            data: [st.hadir, st.izin + st.sakit, (total - st.hadir)], 
                            backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] 
                        }]
                    },
                    options: { cutout: '80%' }
                });
            } catch(e) {}
        }

        async function loadKegiatan() {
            try {
                const rs = await fetch(`${API_URL}?action=getKegiatan`);
                const data = await rs.json();
                const cont = document.getElementById('list-kegiatan');
                cont.innerHTML = "";
                data.forEach(i => {
                    cont.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-800">
                        <p class="text-[10px] font-bold text-amber-800 uppercase">${i.kategori}</p>
                        <h3 class="font-bold">${i.judul}</h3>
                        <p class="text-xs text-gray-500">${i.desc}</p>
                    </div>`;
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
